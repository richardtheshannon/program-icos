<!-- Single gratitude entry row -->
<li class="flex items-center justify-between gap-3 px-3 py-2.5 bg-ps-bg/50 border border-ps-border/50 rounded-lg group">
    <div class="flex items-center gap-3 min-w-0">
        <span class="text-pink-400 text-sm font-bold flex-shrink-0">{{ forloop.counter }}.</span>
        <span class="text-gray-300 text-sm truncate">{{ entry.entry }}</span>
    </div>
    <button hx-delete="{% url 'gratitude_delete' entry.pk %}"
            hx-target="#gratitude-list"
            hx-swap="innerHTML"
            hx-confirm="Remove this entry?"
            class="text-ps-muted hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 flex-shrink-0">
        <i data-lucide="x" class="w-4 h-4"></i>
    </button>
</li>
