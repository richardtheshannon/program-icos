<li style="display: flex; align-items: flex-start; justify-content: space-between; gap: var(--pad-2); padding: 8px 0; border-top: 1px solid var(--line-soft);{% if forloop.first %} border-top: 0;{% endif %}">
    <span style="display: flex; align-items: flex-start; gap: 10px; min-width: 0;">
        <span class="mono num" style="color: var(--accent); flex-shrink: 0;">{{ forloop.counter }}.</span>
        <span style="font-size: var(--t-sm);">{{ entry.entry }}</span>
    </span>
    <button type="button"
            hx-delete="{% url 'gratitude_delete' entry.pk %}"
            hx-target="#gratitude-list"
            hx-swap="innerHTML"
            hx-confirm="Remove this entry?"
            class="btn-sm btn-ghost mono"
            style="background: transparent; border: 0; color: var(--ink-3); cursor: pointer; padding: 2px 8px; font-size: var(--t-xs); flex-shrink: 0;"
            aria-label="Remove gratitude entry">×</button>
</li>
