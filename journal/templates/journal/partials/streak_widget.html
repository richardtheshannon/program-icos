{% if streak > 0 %}
    <span class="mono" style="display: inline-flex; align-items: baseline; gap: 6px; color: var(--accent);">
        <span class="num" style="font-size: var(--t-2xl); font-weight: 600;">{{ streak }}</span>
        <span style="font-size: var(--t-xs); text-transform: uppercase; letter-spacing: 0.08em;">DAY{{ streak|pluralize }} STREAK</span>
    </span>
{% else %}
    <p class="mono" style="color: var(--ink-3); margin: 0;">Start your streak today.</p>
{% endif %}
