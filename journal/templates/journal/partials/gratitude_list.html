{% if entries %}
<ul style="list-style: none; margin: 0 0 var(--pad-2); padding: 0;">
    {% for entry in entries %}
        {% include "journal/partials/gratitude_entry.html" %}
    {% endfor %}
</ul>
{% else %}
<p class="mono" style="color: var(--ink-3); margin: 0 0 var(--pad-2);">No entries yet · add your first gratitude below.</p>
{% endif %}

<form hx-post="{% url 'gratitude_add' %}" hx-target="#gratitude-list" hx-swap="innerHTML" style="display: flex; gap: 8px; align-items: flex-end;">
    {% csrf_token %}
    <div class="field" style="flex: 1; margin: 0;">
        {{ form.entry }}
    </div>
    <button type="submit" class="btn btn-primary btn-sm" style="white-space: nowrap;">Add</button>
</form>
