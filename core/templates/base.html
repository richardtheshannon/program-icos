<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Powerful Silence{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ps: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            accent: '#6366f1',
                            'accent-hover': '#818cf8',
                            muted: '#94a3b8',
                            border: '#334155',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            .bg-ps-card { background: white !important; border-color: #ccc !important; }
            .text-white, .text-gray-200, .text-gray-300 { color: black !important; }
            .text-ps-muted { color: #555 !important; }
            /* Hide sidebar, topbar, messages, and non-print UI */
            nav, .lg\\:ml-64 > :first-child, [x-show], .no-print,
            button[type="submit"], .sticky { display: none !important; }
            .lg\\:ml-64 { margin-left: 0 !important; }
            main { padding: 0 !important; }
            a { color: black !important; text-decoration: none !important; }
        }
        /* HTMX loading indicator */
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-ps-bg text-gray-200"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      x-data="{ sidebarOpen: false }">

    <!-- Skip to main content (accessibility) -->
    <a href="#main-content"
       class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:top-2 focus:left-2 focus:px-4 focus:py-2 focus:bg-ps-accent focus:text-white focus:rounded-lg">
        Skip to main content
    </a>

    <div class="flex h-full">
        <!-- Sidebar -->
        {% include "components/sidebar.html" %}

        <!-- Main content area -->
        <div class="flex-1 flex flex-col min-h-screen lg:ml-64">
            <!-- Topbar -->
            {% include "components/topbar.html" %}

            <!-- Messages -->
            {% include "components/messages.html" %}

            <!-- Page content -->
            <main class="flex-1 p-4 sm:p-6" id="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Mobile sidebar overlay -->
    <div x-show="sidebarOpen"
         x-transition:enter="transition-opacity ease-linear duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-linear duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black/50 z-30 lg:hidden"
         @click="sidebarOpen = false"
         style="display: none;">
    </div>

    <script>
        // Initialize Lucide icons after page load
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
        // Re-initialize after HTMX swaps
        document.addEventListener('htmx:afterSwap', () => lucide.createIcons());
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
