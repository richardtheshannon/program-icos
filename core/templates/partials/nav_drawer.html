<aside class="menu-drawer" id="nav-drawer" aria-hidden="true" role="dialog" aria-label="Navigation menu">

    <div class="menu-head">
        <div>
            <div class="eyebrow">Navigation</div>
            <div class="title">PS01</div>
        </div>
        <button class="menu-close" id="nav-drawer-close" type="button" aria-label="Close menu">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
    </div>

    <div class="menu-body" id="nav-drawer-body">

        {# Dashboard — leaf, no children #}
        <div class="acc-item acc-leaf{% if active_section == 'dashboard' %} is-current{% endif %}" data-id="dashboard">
            <a class="acc-trigger nav-top-level" href="/dashboard/" data-section="dashboard">
                <span class="ic">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="8" height="10" rx="1"/><rect x="13" y="3" width="8" height="6" rx="1"/><rect x="13" y="11" width="8" height="10" rx="1"/><rect x="3" y="15" width="8" height="6" rx="1"/></svg>
                </span>
                <span class="lbl">Dashboard</span>
                <span class="chev"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
            </a>
        </div>

        {# Steps — collapsible #}
        <div class="acc-item{% if active_section == 'steps' %} open{% endif %}" data-id="steps">
            <button class="acc-trigger nav-top-level" type="button" aria-expanded="{% if active_section == 'steps' %}true{% else %}false{% endif %}" data-section="steps">
                <span class="ic">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18h6M4 12h12M4 6h16"/></svg>
                </span>
                <span class="lbl">Steps</span>
                <span class="chev"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg></span>
            </button>
            <div class="acc-panel">
                <div class="acc-panel-inner">
                    <a href="/steps/"><span>All steps</span><span class="tag">12</span></a>
                    <a href="/steps/export/all/"><span>Export all</span><span class="tag">PDF</span></a>
                </div>
            </div>
        </div>

        {# Journal — collapsible #}
        <div class="acc-item{% if active_section == 'journal' %} open{% endif %}" data-id="journal">
            <button class="acc-trigger nav-top-level" type="button" aria-expanded="{% if active_section == 'journal' %}true{% else %}false{% endif %}" data-section="journal">
                <span class="ic">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12v16H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
                </span>
                <span class="lbl">Journal</span>
                <span class="chev"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg></span>
            </button>
            <div class="acc-panel">
                <div class="acc-panel-inner">
                    <a href="/journal/"><span>Today's check-in</span><span class="tag">·</span></a>
                    <a href="/journal/history/"><span>History</span><span class="tag">·</span></a>
                    <a href="/journal/streak/"><span>Streak</span><span class="tag">·</span></a>
                    <a href="/journal/gratitude/"><span>Gratitude</span><span class="tag">·</span></a>
                    <a href="/journal/gratitude/history/"><span>Gratitude history</span><span class="tag">·</span></a>
                    <a href="/journal/export/"><span>Export PDF</span><span class="tag">↓</span></a>
                </div>
            </div>
        </div>

        {# Amends — collapsible #}
        <div class="acc-item{% if active_section == 'amends' %} open{% endif %}" data-id="amends">
            <button class="acc-trigger nav-top-level" type="button" aria-expanded="{% if active_section == 'amends' %}true{% else %}false{% endif %}" data-section="amends">
                <span class="ic">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 11l3 3 7-7"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </span>
                <span class="lbl">Amends</span>
                <span class="chev"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg></span>
            </button>
            <div class="acc-panel">
                <div class="acc-panel-inner">
                    <a href="/amends/"><span>All people</span><span class="tag">·</span></a>
                    <a href="/amends/add/"><span>Add person</span><span class="tag">+</span></a>
                </div>
            </div>
        </div>

    </div>

    <div class="menu-foot">
        <span>Press · Esc</span>
        <form method="post" action="/logout/" class="logout-inline">
            {% csrf_token %}
            <button type="submit">Sign out</button>
        </form>
    </div>

</aside>
