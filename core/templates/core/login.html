<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Powerful Silence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ps: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            accent: '#6366f1',
                            'accent-hover': '#818cf8',
                            muted: '#94a3b8',
                            border: '#334155',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full bg-ps-bg flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-4">
                <i data-lucide="heart-handshake" class="w-10 h-10 text-ps-accent"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Powerful Silence</h1>
            <p class="text-ps-muted">Your personal recovery companion</p>
        </div>

        <!-- Login form -->
        <div class="bg-ps-card border border-ps-border rounded-xl p-8">
            {% if form.errors %}
            <div class="mb-4 px-4 py-3 rounded-lg bg-red-900/50 text-red-300 border border-red-800 text-sm">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-300 mb-1.5">
                        Username
                    </label>
                    <input type="text" name="username" id="id_username" autofocus
                           class="w-full px-4 py-2.5 bg-ps-bg border border-ps-border rounded-lg text-white
                                  placeholder-ps-muted focus:outline-none focus:ring-2 focus:ring-ps-accent focus:border-transparent"
                           placeholder="Enter your username">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-300 mb-1.5">
                        Password
                    </label>
                    <input type="password" name="password" id="id_password"
                           class="w-full px-4 py-2.5 bg-ps-bg border border-ps-border rounded-lg text-white
                                  placeholder-ps-muted focus:outline-none focus:ring-2 focus:ring-ps-accent focus:border-transparent"
                           placeholder="Enter your password">
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-ps-accent hover:bg-ps-accent-hover text-white font-medium rounded-lg
                               transition-colors focus:outline-none focus:ring-2 focus:ring-ps-accent focus:ring-offset-2 focus:ring-offset-ps-bg">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Footer quote -->
        <p class="text-center text-xs text-ps-muted mt-6 italic">
            "God, grant me the serenity to accept the things I cannot change,<br>
            courage to change the things I can,<br>
            and wisdom to know the difference."
        </p>
    </div>
    <script>document.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
</body>
</html>
