<div class="card-head">
    <h3>Gratitude today</h3>
    {% if gratitude_count > 0 %}
        <span class="meta mono"><span class="num">{{ gratitude_count }}</span> ENTR{{ gratitude_count|pluralize:"Y,IES" }}</span>
    {% endif %}
</div>
<div class="card-body">
    {% if gratitude_count > 0 %}
        <p><span class="num" style="font-size: var(--t-2xl); font-weight: 600;">{{ gratitude_count }}</span> <span class="mono">today</span></p>
        <a href="{% url 'gratitude' %}" class="btn btn-ghost btn-sm">View gratitude</a>
    {% else %}
        <p class="mono" style="color: var(--ink-3);">No entries yet today · what are you grateful for?</p>
        <a href="{% url 'gratitude' %}" class="btn btn-primary btn-sm">Add gratitude</a>
    {% endif %}
</div>
