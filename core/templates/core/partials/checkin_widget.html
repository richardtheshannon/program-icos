<div class="card-head">
    <h3>Today's check-in</h3>
    {% if checkin_streak > 0 %}
        <span class="meta mono"><span class="num">{{ checkin_streak }}</span> DAY STREAK</span>
    {% endif %}
</div>
<div class="card-body">
    {% if todays_checkin %}
        <p class="mono" style="color: var(--ok);">✓ Complete</p>
        <p class="mono" style="color: var(--ink-3); font-size: var(--t-sm);">
            Serenity <span class="num">{{ todays_checkin.serenity_level }}</span>/10 ·
            Mood <span class="num">{{ todays_checkin.mood }}</span>/10
        </p>
        <a href="{% url 'daily_checkin' %}" class="btn btn-ghost btn-sm">Review check-in</a>
    {% else %}
        <p class="mono" style="color: var(--ink-3);">Not yet completed.</p>
        <a href="{% url 'daily_checkin' %}" class="btn btn-primary btn-sm">Start check-in</a>
    {% endif %}
</div>
