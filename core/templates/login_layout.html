{% load static %}<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}Sign in · PS01{% endblock %}</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2C5F3F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PS01">
    <link rel="apple-touch-icon" href="{% static 'icons/icon-192.png' %}">
    <meta name="app-id" content="ps01">
    <meta name="apps-json-url" content="https://icos.dev/apps.json">
    <script>
    (function () {
        try {
            var root = document.documentElement;
            var raw = localStorage.getItem("ritual_state");
            var s = raw ? JSON.parse(raw) : {};
            if (!s || typeof s !== "object") s = {};
            root.setAttribute("data-app-mode", s.appMode || "photo");
            root.setAttribute("data-density", s.density || "comfortable");
            root.setAttribute("data-view-mode", s.viewMode || "bright");
        } catch (e) {}
    })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block head_extra %}{% endblock %}
</head>
<body class="login-body">
    <div class="bg"><div class="grain"></div><div class="view-dim" aria-hidden="true"></div></div>
    <div class="frame"></div>

    <div class="app">
        {# Minimal frame — TL PS01 logo + BL anon avatar + TR app drawer + bottom mode rail. #}
        <div class="corner tl">
            <a class="logo" href="/login/" aria-label="PS01 home">
                <span class="mark" aria-hidden="true"></span>
                <span class="name">PS01</span>
            </a>
        </div>
        <div class="corner tr">
            <button class="app-drawer-btn" id="app-drawer-btn" type="button"
                    aria-label="Open app drawer" aria-expanded="false" aria-controls="app-drawer">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="6"  cy="6"  r="1.4"/>
                    <circle cx="12" cy="6"  r="1.4"/>
                    <circle cx="18" cy="6"  r="1.4"/>
                    <circle cx="6"  cy="12" r="1.4"/>
                    <circle cx="12" cy="12" r="1.4"/>
                    <circle cx="18" cy="12" r="1.4"/>
                    <circle cx="6"  cy="18" r="1.4"/>
                    <circle cx="12" cy="18" r="1.4"/>
                    <circle cx="18" cy="18" r="1.4"/>
                </svg>
            </button>
        </div>
        <div class="corner bl">
            <div class="avatar avatar-anon" aria-label="Not signed in"></div>
        </div>
        <div class="corner br" aria-hidden="true"></div>

        <div class="region bottom" data-rail="bottom">
            <button type="button" class="ib" data-action="set-mode" data-mode="photo" aria-label="Photo mode" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="M3 16l5-5 4 4 4-3 5 4"/></svg>
                <span class="tip">Photo</span>
            </button>
            <button type="button" class="ib" data-action="set-mode" data-mode="light" aria-label="Light mode" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                <span class="tip">Light</span>
            </button>
            <button type="button" class="ib" data-action="set-mode" data-mode="dark" aria-label="Dark mode" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14A8 8 0 1110 4a6 6 0 0010 10z"/></svg>
                <span class="tip">Dark</span>
            </button>
        </div>

        <main class="workspace">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="drawer-scrim" id="drawer-scrim"></div>
    {% include 'partials/app_drawer.html' %}

    <script src="{% static 'js/preferences.js' %}" defer></script>
    <script src="{% static 'js/drawer.js' %}" defer></script>
    <script src="{% static 'js/frame.js' %}" defer></script>
    <script src="{% static 'js/sw-register.js' %}" defer></script>
</body>
</html>
