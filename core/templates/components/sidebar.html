<!-- Sidebar navigation -->
<aside class="fixed inset-y-0 left-0 z-40 w-64 bg-ps-card border-r border-ps-border transform transition-transform duration-300 ease-in-out"
       :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'">
    <div class="flex flex-col h-full">
        <!-- Logo / App name -->
        <div class="flex items-center gap-3 px-6 py-5 border-b border-ps-border">
            <i data-lucide="heart-handshake" class="w-8 h-8 text-ps-accent"></i>
            <div>
                <h1 class="text-lg font-bold text-white">Powerful Silence</h1>
                <p class="text-xs text-ps-muted">One day at a time</p>
            </div>
        </div>

        <!-- Navigation links -->
        <nav class="flex-1 px-4 py-4 space-y-1">
            <a href="{% url 'dashboard' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                      {% if request.resolver_match.url_name == 'dashboard' %}bg-ps-accent/20 text-ps-accent-hover{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                Dashboard
            </a>
            <a href="{% url 'step_list' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                      {% if request.resolver_match.url_name == 'step_list' or request.resolver_match.url_name == 'step_detail' %}bg-ps-accent/20 text-ps-accent-hover{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}">
                <i data-lucide="list-ordered" class="w-5 h-5"></i>
                My Step Work
            </a>
            <a href="{% url 'daily_checkin' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                      {% if request.resolver_match.url_name == 'daily_checkin' or request.resolver_match.url_name == 'daily_checkin_date' or request.resolver_match.url_name == 'journal_history' %}bg-ps-accent/20 text-ps-accent-hover{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}">
                <i data-lucide="calendar-check" class="w-5 h-5"></i>
                Daily Check-In
            </a>
            <a href="{% url 'gratitude' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                      {% if request.resolver_match.url_name == 'gratitude' or request.resolver_match.url_name == 'gratitude_history' %}bg-ps-accent/20 text-ps-accent-hover{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                Gratitude Journal
            </a>
            <a href="{% url 'person_list' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                      {% if request.resolver_match.url_name == 'person_list' or request.resolver_match.url_name == 'person_detail' or request.resolver_match.url_name == 'person_create' or request.resolver_match.url_name == 'person_update' %}bg-ps-accent/20 text-ps-accent-hover{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}">
                <i data-lucide="handshake" class="w-5 h-5"></i>
                Amends List
            </a>
        </nav>

        <!-- Sobriety counter -->
        {% if user.sobriety_date %}
        <div class="px-6 py-4 border-t border-ps-border">
            <p class="text-xs text-ps-muted uppercase tracking-wider mb-1">Sobriety</p>
            <p class="text-2xl font-bold text-white">{{ user.sobriety_days }} days</p>
            <p class="text-xs text-ps-muted">Since {{ user.sobriety_date|date:"M j, Y" }}</p>
        </div>
        {% endif %}

        <!-- User / Logout -->
        <div class="px-6 py-4 border-t border-ps-border">
            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <p class="text-white font-medium">{{ user.first_name|default:user.username }}</p>
                    <p class="text-xs text-ps-muted">{{ user.email }}</p>
                </div>
                <a href="{% url 'logout' %}" class="text-ps-muted hover:text-white transition-colors" title="Sign out">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </a>
            </div>
        </div>
    </div>
</aside>
