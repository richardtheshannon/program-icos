<!-- Django messages -->
{% if messages %}
<div class="px-6 pt-4 space-y-2">
    {% for message in messages %}
    <div x-data="{ show: true }"
         x-show="show"
         x-init="setTimeout(() => show = false, 5000)"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-2"
         class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm
                {% if message.tags == 'success' %}bg-green-900/50 text-green-300 border border-green-800
                {% elif message.tags == 'error' %}bg-red-900/50 text-red-300 border border-red-800
                {% elif message.tags == 'warning' %}bg-amber-900/50 text-amber-300 border border-amber-800
                {% else %}bg-blue-900/50 text-blue-300 border border-blue-800{% endif %}">
        <span class="flex-1">{{ message }}</span>
        <button @click="show = false" class="opacity-60 hover:opacity-100 transition-opacity">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
