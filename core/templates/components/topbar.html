<!-- Top bar -->
<header class="sticky top-0 z-20 bg-ps-bg/80 backdrop-blur-sm border-b border-ps-border">
    <div class="flex items-center justify-between px-6 py-4">
        <!-- Mobile menu button -->
        <button @click="sidebarOpen = !sidebarOpen"
                class="lg:hidden text-gray-400 hover:text-white transition-colors p-2 -ml-2"
                aria-label="Toggle navigation menu"
                :aria-expanded="sidebarOpen">
            <i data-lucide="menu" class="w-6 h-6" aria-hidden="true"></i>
        </button>

        <!-- Page title -->
        <h2 class="text-xl font-semibold text-white">
            {% block page_title %}Dashboard{% endblock %}
        </h2>

        <!-- Right side -->
        <div class="flex items-center gap-4">
            <span class="text-sm text-ps-muted hidden sm:inline">
                Welcome, {{ user.first_name|default:user.username }}
            </span>
        </div>
    </div>
</header>
