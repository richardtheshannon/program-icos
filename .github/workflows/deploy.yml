# POST-DEPLOY MANUAL STEP (cPanel Terminal):
# This workflow only ships files via FTP — it does NOT run Django commands on prod.
# After any deploy that touches steps/migrations/ OR steps/management/commands/seed_steps.py,
# open cPanel → Advanced → Terminal, cd to the app dir, and run:
#     python manage.py migrate --noinput
#     python manage.py seed_steps
# seed_steps is idempotent (update_or_create), so re-running is safe.

name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --tb=short -q
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          SECRET_KEY: test-secret-key-for-ci

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/__pycache__/**
            .env
            db.sqlite3
            .ralph/**
            00_research/**
            _TEMP/**
            pip-cache/**
            bin/**
            Dockerfile
            docker-compose.yml
            pytest.ini
            .gitignore
            staticfiles/**
            index.html
