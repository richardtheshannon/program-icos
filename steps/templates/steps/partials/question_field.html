<div class="field" role="group" aria-labelledby="label-{{ item.field_name }}" style="margin-bottom: var(--pad-3);">
    <label id="label-{{ item.field_name }}" for="id_{{ item.field_name }}" class="field-label">
        <span class="mono" style="display: inline-block; min-width: 2.4em; color: var(--ink-3);">Q{{ item.question.number }}.</span>
        {{ item.question.text }}
    </label>
    {% if item.question.help_text %}
        <p id="help-{{ item.field_name }}" class="mono" style="font-size: var(--t-xs); color: var(--ink-3); margin: 4px 0 6px;">{{ item.question.help_text }}</p>
    {% endif %}
    <textarea
        name="{{ item.field_name }}"
        id="id_{{ item.field_name }}"
        rows="{{ item.field.field.widget.attrs.rows }}"
        placeholder="{{ item.field.field.widget.attrs.placeholder }}"
        class="field-input"
        {% if item.question.help_text %}aria-describedby="help-{{ item.field_name }}"{% endif %}
        hx-post="{% url 'auto_save_response' %}"
        hx-trigger="keyup changed delay:1s"
        hx-vals='{"question_id": "{{ item.question.id }}"}'
        hx-target="#save-indicator-{{ item.question.id }}"
        hx-swap="innerHTML"
        hx-include="[name='{{ item.field_name }}']"
        style="resize: vertical; min-height: 4rem;"
    >{{ item.field.value|default:"" }}</textarea>
    <div style="display: flex; justify-content: flex-end; margin-top: 4px;">
        <span id="save-indicator-{{ item.question.id }}" aria-live="polite"></span>
    </div>
</div>
