{% comment %}
Reusable progress bar component.
Expects: percentage (int 0-100), status (string)
Color-coded: gray (not_started), indigo (in_progress), green (complete), amber (revisiting)
{% endcomment %}
<div class="w-full bg-gray-700 rounded-full h-2">
    <div class="h-2 rounded-full transition-all duration-500
                {% if status == 'complete' %}bg-emerald-500
                {% elif status == 'revisiting' %}bg-amber-500
                {% elif status == 'in_progress' %}bg-ps-accent
                {% else %}bg-gray-600{% endif %}"
         style="width: {{ percentage }}%">
    </div>
</div>
