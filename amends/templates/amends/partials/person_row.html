<tr>
    <td>
        <a href="{% url 'person_detail' person.pk %}" style="text-decoration: none; color: var(--ink); display: block;">
            <span style="font-weight: 600;">{{ person.name }}</span>
            {% if person.relationship %}
                <p class="mono" style="margin: 2px 0 0; font-size: var(--t-xs); color: var(--ink-3);">{{ person.relationship }}</p>
            {% endif %}
        </a>
    </td>
    <td>
        {% include "amends/partials/amend_status.html" with status=person.current_status %}
    </td>
    <td class="row-actions">
        <a href="{% url 'person_detail' person.pk %}" class="btn btn-ghost btn-sm">View</a>
        <a href="{% url 'person_update' person.pk %}" class="btn btn-ghost btn-sm">Edit</a>
    </td>
</tr>
