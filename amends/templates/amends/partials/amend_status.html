{% with s=status %}
<span class="mono" style="display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: var(--t-xs); text-transform: uppercase; letter-spacing: 0.06em;
    {% if s == 'amend_made' %}background: rgba(60, 130, 90, 0.16); color: var(--ok); border: 1px solid var(--ok);
    {% elif s == 'ongoing' %}background: rgba(44, 95, 63, 0.18); color: var(--accent); border: 1px solid var(--accent);
    {% elif s == 'discussed' %}background: rgba(44, 95, 63, 0.10); color: var(--accent); border: 1px solid color-mix(in oklab, var(--accent) 60%, transparent);
    {% elif s == 'letter_drafted' %}background: rgba(180, 140, 50, 0.12); color: var(--warn); border: 1px solid var(--warn);
    {% else %}background: var(--bg-elev); color: var(--ink-3); border: 1px solid var(--line-soft);
    {% endif %}">{% if s == 'amend_made' %}AMEND MADE{% elif s == 'ongoing' %}ONGOING{% elif s == 'discussed' %}DISCUSSED{% elif s == 'letter_drafted' %}LETTER DRAFTED{% else %}NOT STARTED{% endif %}</span>
{% endwith %}
